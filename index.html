<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shipping Form</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: .875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: .35rem;
    }

    input, select, textarea {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 1rem;
      color: #111;
      background: #fff;
    }

    input:focus, select:focus, textarea:focus {
      outline: 2px solid #3b82f6;
      outline-offset: 1px;
      border-color: transparent;
    }

    textarea { resize: vertical; min-height: 80px; }

    button[type="submit"] {
      width: 100%;
      padding: .65rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: .5rem;
    }

    button[type="submit"]:hover { background: #1d4ed8; }

    .summary {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      font-size: .9rem;
      color: #166534;
    }

    .summary h2 {
      font-size: 1rem;
      margin-bottom: .75rem;
      color: #15803d;
    }

    .summary dl { display: grid; grid-template-columns: auto 1fr; gap: .3rem .75rem; }
    .summary dt { font-weight: 600; }
    .summary dd { word-break: break-word; }
  </style>
</head>
<body>
  <div class="card" x-data="{
    form: { name: '', address: '', weight: '', method: '' },
    submitted: null,
    submit() {
      this.submitted = { ...this.form };
    }
  }">
    <h1>Shipping Form</h1>

    <form @submit.prevent="submit()">
      <div class="field">
        <label for="name">Ship-To Name</label>
        <input id="name" type="text" x-model="form.name" placeholder="Jane Doe" required>
      </div>

      <div class="field">
        <label for="address">Shipping Address</label>
        <textarea id="address" x-model="form.address" placeholder="123 Main St, City, State, ZIP" required></textarea>
      </div>

      <div class="field">
        <label for="weight">Package Weight (kg)</label>
        <input id="weight" type="number" x-model="form.weight" placeholder="0.0" min="0.1" step="0.1" required>
      </div>

      <div class="field">
        <label for="method">Shipping Method</label>
        <select id="method" x-model="form.method" required>
          <option value="" disabled>Select a method</option>
          <option value="Standard">Standard (5–7 days)</option>
          <option value="Express">Express (2–3 days)</option>
          <option value="Overnight">Overnight (next day)</option>
          <option value="Economy">Economy (7–14 days)</option>
        </select>
      </div>

      <button type="submit">Submit</button>
    </form>

    <div class="summary" x-show="submitted" x-cloak>
      <h2>Order Summary</h2>
      <dl>
        <dt>Name</dt>       <dd x-text="submitted?.name"></dd>
        <dt>Address</dt>    <dd x-text="submitted?.address"></dd>
        <dt>Weight</dt>     <dd x-text="submitted?.weight + ' kg'"></dd>
        <dt>Method</dt>     <dd x-text="submitted?.method"></dd>
      </dl>
    </div>
  </div>
</body>
</html>
