<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shipping Form</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      padding: 2rem;
      width: 100%;
      max-width: 540px;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: .875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: .35rem;
    }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    input[type="email"],
    input[type="tel"],
    select,
    textarea {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 1rem;
      color: #111;
      background: #fff;
    }

    input:focus, select:focus, textarea:focus {
      outline: 2px solid #3b82f6;
      outline-offset: 1px;
      border-color: transparent;
    }

    textarea { resize: vertical; min-height: 80px; }

    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem .75rem;
      margin-top: .2rem;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: .35rem;
      font-weight: 400;
      font-size: .95rem;
      cursor: pointer;
      margin-bottom: 0;
    }

    .radio-group input[type="radio"] {
      width: auto;
      accent-color: #2563eb;
      flex-shrink: 0;
    }

    .radio-option {
      display: flex;
      align-items: flex-start;
      gap: .4rem;
    }

    .radio-option input[type="radio"] {
      margin-top: .2rem;
    }

    .radio-option-text { display: flex; flex-direction: column; }
    .radio-option-text span { font-weight: 600; font-size: .95rem; color: #111; }
    .radio-option-text small { font-weight: 400; font-size: .8rem; color: #6b7280; line-height: 1.3; }

    button[type="submit"] {
      width: 100%;
      padding: .65rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: .5rem;
    }

    button[type="submit"]:hover { background: #1d4ed8; }

    .summary {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      font-size: .9rem;
      color: #166534;
    }

    .summary h2 {
      font-size: 1rem;
      margin-bottom: .75rem;
      color: #15803d;
    }

    .summary dl { display: grid; grid-template-columns: auto 1fr; gap: .3rem .75rem; }
    .summary dt { font-weight: 600; }
    .summary dd { word-break: break-word; }
  </style>
</head>
<body>
  <div class="card" x-data="{
    form: {
      name: '', address: '', weight: '', method: '',
      initials: '', store: '', date: '',
      email: '', phone: '', emailTracking: '',
      specialRequests: '', sendReceipt: ''
    },
    submitted: null,
    submit() {
      this.submitted = { ...this.form };
    }
  }">
    <h1>Shipping Form</h1>

    <form @submit.prevent="submit()">

      <div class="field">
        <label for="initials">Employee Initials</label>
        <input id="initials" type="text" x-model="form.initials" placeholder="AB" required>
      </div>

      <div class="field">
        <label>Store</label>
        <div class="radio-group">
          <label><input type="radio" x-model="form.store" value="112th" required> 112th</label>
          <label><input type="radio" x-model="form.store" value="Broadway"> Broadway</label>
          <label><input type="radio" x-model="form.store" value="LIC"> LIC</label>
          <label><input type="radio" x-model="form.store" value="Pittsford"> Pittsford</label>
        </div>
      </div>

      <div class="field">
        <label for="date">Date</label>
        <input id="date" type="date" x-model="form.date" required>
      </div>

      <div class="field">
        <label for="name">Ship-To Name</label>
        <input id="name" type="text" x-model="form.name" placeholder="Jane Doe" required>
      </div>

      <div class="field">
        <label for="address">Shipping Address</label>
        <textarea id="address" x-model="form.address" placeholder="123 Main St, City, State, ZIP" required></textarea>
      </div>

      <div class="field">
        <label for="email">Customer Email</label>
        <input id="email" type="text" x-model="form.email" placeholder="customer@example.com">
      </div>

      <div class="field">
        <label for="phone">Phone #</label>
        <input id="phone" type="tel" x-model="form.phone" placeholder="(555) 555-5555">
      </div>

      <div class="field">
        <label for="weight">Package Weight (kg)</label>
        <input id="weight" type="number" x-model="form.weight" placeholder="0.0" min="0.1" step="0.1" required>
      </div>

      <div class="field">
        <label>Shipping Method</label>
        <div class="radio-group" style="flex-direction: column; gap: .6rem;">
          <label class="radio-option">
            <input type="radio" x-model="form.method" value="USPS Media Mail" required>
            <span class="radio-option-text">
              <span>USPS Media Mail</span>
              <small>Books, DVDs, CDs, and other approved media only. Not for general merchandise.</small>
            </span>
          </label>
          <label class="radio-option">
            <input type="radio" x-model="form.method" value="USPS Ground Advantage">
            <span class="radio-option-text">
              <span>USPS Ground Advantage</span>
              <small>Reliable ground delivery in 2–5 business days. Good for most packages.</small>
            </span>
          </label>
          <label class="radio-option">
            <input type="radio" x-model="form.method" value="USPS Priority">
            <span class="radio-option-text">
              <span>USPS Priority</span>
              <small>Faster delivery in 1–3 business days. Includes tracking and insurance.</small>
            </span>
          </label>
          <label class="radio-option">
            <input type="radio" x-model="form.method" value="UPS Ground">
            <span class="radio-option-text">
              <span>UPS Ground</span>
              <small>Delivery in 1–5 business days depending on destination. Reliable for heavier packages.</small>
            </span>
          </label>
        </div>
      </div>

      <div class="field">
        <label>Email tracking?</label>
        <div class="radio-group">
          <label><input type="radio" x-model="form.emailTracking" value="Yes" required> Yes</label>
          <label><input type="radio" x-model="form.emailTracking" value="No"> No</label>
        </div>
      </div>

      <div class="field">
        <label for="specialRequests">Special Requests and/or Customer Info</label>
        <textarea id="specialRequests" x-model="form.specialRequests" placeholder="Any special instructions..."></textarea>
      </div>

      <div class="field">
        <label>Send receipt with shipment?</label>
        <div class="radio-group">
          <label><input type="radio" x-model="form.sendReceipt" value="Yes" required> Yes</label>
          <label><input type="radio" x-model="form.sendReceipt" value="No"> No</label>
        </div>
      </div>

      <button type="submit">Submit</button>
    </form>

    <div class="summary" x-show="submitted" x-cloak>
      <h2>Order Summary</h2>
      <dl>
        <dt>Initials</dt>         <dd x-text="submitted?.initials"></dd>
        <dt>Store</dt>            <dd x-text="submitted?.store"></dd>
        <dt>Date</dt>             <dd x-text="submitted?.date"></dd>
        <dt>Ship-To Name</dt>     <dd x-text="submitted?.name"></dd>
        <dt>Address</dt>          <dd x-text="submitted?.address"></dd>
        <dt>Email</dt>            <dd x-text="submitted?.email || '—'"></dd>
        <dt>Phone</dt>            <dd x-text="submitted?.phone || '—'"></dd>
        <dt>Weight</dt>           <dd x-text="submitted?.weight + ' kg'"></dd>
        <dt>Method</dt>           <dd x-text="submitted?.method"></dd>
        <dt>Email Tracking</dt>   <dd x-text="submitted?.emailTracking"></dd>
        <dt>Special Requests</dt> <dd x-text="submitted?.specialRequests || '—'"></dd>
        <dt>Send Receipt</dt>     <dd x-text="submitted?.sendReceipt"></dd>
      </dl>
    </div>
  </div>
</body>
</html>
